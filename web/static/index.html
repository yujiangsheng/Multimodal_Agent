<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinocchio — 多模态自我进化智能体</title>
<style>
:root {
  --bg: #0f0f17;
  --bg2: #161622;
  --surface: #1c1c2e;
  --surface2: #252540;
  --border: #2a2a45;
  --border2: #35355a;
  --text: #e2e4f0;
  --text2: #9496b0;
  --dim: #5c5e78;
  --accent: #7c6ff7;
  --accent2: #9d8dff;
  --green: #4ade80;
  --green2: #22c55e;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --cyan: #22d3ee;
  --orange: #fb923c;
  --radius: 16px;
  --radius-s: 10px;
  --radius-xs: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans SC", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ═══ Layout ═══════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 260px 1fr 380px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  transition: grid-template-columns .2s ease;
}
.app.sidebar-collapsed {
  grid-template-columns: 0px 1fr 380px;
}

/* ─── Top bar ───────────────────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.llm-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  background: rgba(74, 222, 128, 0.1);
  border: 1px solid rgba(74, 222, 128, 0.25);
  border-radius: 20px;
  font-size: 11px;
  color: var(--green);
}
.llm-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.topbar-right { display: flex; gap: 8px; }
.top-btn {
  padding: 5px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.top-btn:hover { background: var(--surface2); color: var(--text); }

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  margin-left: 24px;
}
.tab {
  padding: 6px 14px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  cursor: pointer;
  font-size: 13px;
  transition: all .15s;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* ─── Chat pane ─────────────────────────────────────────── */
.chat-pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: var(--radius-s);
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
  position: relative;
}
.msg-user { white-space: pre-wrap; }
.msg-user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-agent {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-system {
  align-self: center;
  color: var(--dim);
  font-size: 11px;
  padding: 2px 0;
}

/* Attachments */
.msg-att {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}
.att-pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  font-size: 11px;
}
.att-pill img {
  max-width: 80px;
  max-height: 56px;
  border-radius: 3px;
}

/* Typing dots */
.typing { padding: 10px 14px; }
.typing span {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--dim);
  border-radius: 50%;
  margin-right: 3px;
  animation: bounce 1.4s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

/* Phase progress stepper */
.phase-progress {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
  padding: 10px 14px;
  max-width: 78%;
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  font-size: 12px;
}
.phase-step {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--surface2);
  color: var(--dim);
  transition: all .3s ease;
  white-space: nowrap;
}
.phase-step.running {
  background: rgba(124,111,247,0.15);
  color: var(--accent2);
  box-shadow: 0 0 8px rgba(124,111,247,0.2);
}
.phase-step.done {
  background: rgba(74,222,128,0.1);
  color: var(--green);
}
.phase-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  transition: all .3s ease;
}
.phase-step.running .phase-dot {
  background: var(--accent);
  animation: pulse 1s ease-in-out infinite;
}
.phase-step.done .phase-dot {
  background: var(--green);
}
.phase-arrow {
  color: var(--dim);
  font-size: 10px;
}

/* ─── Input bar ─────────────────────────────────────────── */
.input-area {
  padding: 14px 24px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
.file-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.file-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: var(--surface2);
  border-radius: var(--radius-xs);
  font-size: 11px;
  color: var(--text2);
}
.file-pill .rm { cursor: pointer; color: var(--red); font-weight: 700; }
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-row textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  color: var(--text);
  padding: 9px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 40px;
  max-height: 140px;
  line-height: 1.5;
}
.input-row textarea:focus { outline: none; border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--dim); }

.attach-group { display: flex; gap: 3px; }
.att-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  transition: all .12s;
}
.att-btn:hover { border-color: var(--accent); color: var(--text); }
.att-btn input[type="file"] { display: none; }
.send-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-xs);
  color: #fff;
  cursor: pointer;
  font-size: 17px;
  transition: opacity .12s;
}
.send-btn:hover { opacity: .85; }
.send-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ═══ Right panel ═════════════════════════════════════════ */
.right-panel {
  overflow-y: auto;
  background: var(--bg2);
  padding: 0;
}
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Panel content — each tab */
.panel-view { display: none; padding: 16px; }
.panel-view.active { display: block; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  padding: 14px;
  margin-bottom: 12px;
}
.card h4 {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent2);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 10px;
}
.kv {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 13px;
}
.kv .k { color: var(--text2); }
.kv .v { color: var(--text); font-weight: 500; }
.kv .v.g { color: var(--green); }
.kv .v.y { color: var(--yellow); }
.kv .v.r { color: var(--red); }

/* Sparkline / Score chart */
.chart-wrap {
  width: 100%;
  height: 120px;
  position: relative;
  margin-top: 8px;
}
.chart-wrap canvas { width: 100%; height: 100%; }

/* Memory list */
.mem-list { display: flex; flex-direction: column; gap: 8px; }
.mem-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.55;
  cursor: pointer;
  transition: border-color .12s;
}
.mem-item:hover { border-color: var(--accent); }
.mem-item .mi-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.mem-item .mi-title {
  font-weight: 600;
  color: var(--text);
  font-size: 12px;
}
.mi-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.tag-ep { background: rgba(96,165,250,.15); color: var(--blue); }
.tag-sem { background: rgba(34,211,238,.15); color: var(--cyan); }
.tag-proc { background: rgba(251,191,36,.15); color: var(--yellow); }
.tag-persistent { background: rgba(74,222,128,.15); color: var(--green); }
.tag-long_term { background: rgba(156,163,175,.12); color: var(--text2); }
.tag-working { background: rgba(251,146,60,.12); color: var(--orange); }

.mi-body { color: var(--text2); }
.mi-score {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-weight: 600;
}
.mi-lessons {
  margin-top: 4px;
  padding-left: 14px;
  color: var(--dim);
  font-size: 11px;
}
.mi-lessons li { margin-bottom: 2px; }
.mi-meta {
  margin-top: 4px;
  font-size: 10px;
  color: var(--dim);
}
.mi-steps {
  margin-top: 4px;
  counter-reset: step;
  padding-left: 0;
  list-style: none;
}
.mi-steps li {
  counter-increment: step;
  margin-bottom: 2px;
  color: var(--text2);
  font-size: 11px;
}
.mi-steps li::before {
  content: counter(step);
  display: inline-flex;
  width: 16px; height: 16px;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: var(--accent2);
  margin-right: 6px;
}

/* Empty state */
.empty {
  text-align: center;
  color: var(--dim);
  font-size: 13px;
  padding: 30px 0;
}

/* ─── Sidebar (ChatGPT style) ───────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: column;
  background: #0a0a14;
  overflow: hidden;
  transition: width .2s ease, opacity .15s ease;
}
.app.sidebar-collapsed .sidebar {
  width: 0; opacity: 0; pointer-events: none;
}
/* Toggle button (floating hamburger when collapsed) */
.sidebar-toggle {
  position: fixed; top: 14px; left: 12px; z-index: 50;
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 18px; padding: 4px 6px;
  border-radius: 6px; transition: background .12s;
  display: none; /* shown only when collapsed */
}
.sidebar-toggle:hover { background: var(--surface); }
.app.sidebar-collapsed .sidebar-toggle { display: block; }

/* Sidebar top area */
.sb-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 12px 0;
}
.sb-top-left { display: flex; align-items: center; gap: 4px; }
.sb-new-chat {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border2);
  border-radius: 10px; padding: 8px 14px;
  color: var(--text); cursor: pointer; font-size: 13px;
  font-weight: 500; transition: background .12s;
}
.sb-new-chat:hover { background: var(--surface); }
.sb-new-chat svg { width: 16px; height: 16px; }
.sb-collapse-btn {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 18px; padding: 4px 6px;
  border-radius: 6px; transition: background .12s;
}
.sb-collapse-btn:hover { background: var(--surface); }

/* Search */
.sb-search {
  padding: 10px 12px 4px;
}
.sb-search input {
  width: 100%; padding: 8px 10px 8px 30px;
  background: var(--surface); border: 1px solid transparent;
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: inherit; outline: none; transition: border-color .15s;
}
.sb-search input:focus { border-color: var(--border2); }
.sb-search input::placeholder { color: var(--dim); }
.sb-search-wrap {
  position: relative;
}
.sb-search-wrap svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--dim); pointer-events: none;
}

/* Session list */
.session-list {
  flex: 1; overflow-y: auto; padding: 4px 8px;
}
.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.session-list::-webkit-scrollbar-track { background: transparent; }

/* Date group header */
.session-group-label {
  font-size: 11px; font-weight: 600; color: var(--dim);
  padding: 14px 12px 6px; text-transform: uppercase;
  letter-spacing: .04em;
}

/* Session item */
.session-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 13.5px; color: var(--text2);
  transition: background .1s; position: relative;
  margin-bottom: 1px;
}
.session-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
.session-item.active { background: rgba(255,255,255,.08); color: var(--text); }
.session-title {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; line-height: 1.35;
}

/* 3-dot menu trigger */
.session-dots {
  background: none; border: none; color: var(--dim);
  cursor: pointer; padding: 2px 4px; border-radius: 4px;
  font-size: 16px; line-height: 1; opacity: 0;
  transition: opacity .12s, background .1s;
}
.session-item:hover .session-dots,
.session-item .session-dots.open { opacity: 1; }
.session-dots:hover { background: rgba(255,255,255,.08); color: var(--text); }

/* Dropdown menu */
.session-dropdown {
  position: absolute; right: 8px; top: 100%; z-index: 60;
  background: #1e1e30; border: 1px solid var(--border2);
  border-radius: 8px; padding: 4px; min-width: 130px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  display: none;
}
.session-dropdown.show { display: block; }
.session-dropdown button {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: none; border: none;
  color: var(--text2); cursor: pointer; font-size: 13px;
  border-radius: 6px; transition: background .1s;
}
.session-dropdown button:hover { background: rgba(255,255,255,.07); color: var(--text); }
.session-dropdown button.danger:hover { color: var(--red); }
.session-dropdown svg { width: 14px; height: 14px; flex-shrink: 0; }

/* Bottom user section */
.sb-bottom {
  border-top: 1px solid rgba(255,255,255,.06);
  padding: 10px 12px;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  cursor: default; font-size: 13px; color: var(--text2);
  transition: background .12s;
}
.sb-user:hover { background: rgba(255,255,255,.06); }
.sb-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.sb-user-name { flex: 1; font-weight: 500; color: var(--text); }

/* ─── Message actions ─────────────────────────────────── */
.msg-actions {
  position: absolute; top: -6px; right: 8px;
  display: flex; gap: 3px; opacity: 0; transition: opacity .12s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-user .msg-actions { right: auto; left: -4px; }
.msg-action-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text2); cursor: pointer;
  font-size: 11px; padding: 2px 6px; line-height: 1.2;
}
.msg-action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── Markdown in agent messages ──────────────────────── */
.msg-agent .msg-body h1,.msg-agent .msg-body h2,.msg-agent .msg-body h3,
.msg-agent .msg-body h4 { margin: 8px 0 4px; font-size: 14px; }
.msg-agent .msg-body h1 { font-size: 16px; }
.msg-agent .msg-body h2 { font-size: 15px; }
.msg-agent .msg-body p { margin: 4px 0; }
.msg-agent .msg-body pre {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-xs); padding: 10px;
  margin: 8px 0; overflow-x: auto; white-space: pre; font-size: 12px;
}
.msg-agent .msg-body code {
  background: rgba(124,111,247,.12); padding: 1px 5px;
  border-radius: 3px; font-family: 'SF Mono','Fira Code',monospace; font-size: 12px;
}
.msg-agent .msg-body pre code { background: transparent; padding: 0; }
.msg-agent .msg-body ul,.msg-agent .msg-body ol { padding-left: 20px; margin: 4px 0; }
.msg-agent .msg-body blockquote {
  border-left: 3px solid var(--accent); padding-left: 12px;
  margin: 8px 0; color: var(--text2);
}
.msg-agent .msg-body table { border-collapse: collapse; margin: 8px 0; font-size: 12px; width: 100%; }
.msg-agent .msg-body th,.msg-agent .msg-body td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
.msg-agent .msg-body th { background: var(--surface2); }
.msg-agent .msg-body a { color: var(--accent2); }
.msg-agent .msg-body hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* ─── Auth dialog ───────────────────────────────────────── */
.auth-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.auth-dialog {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; min-width: 320px; text-align: center;
}
.auth-dialog h3 { margin-bottom: 16px; color: var(--text); font-size: 16px; }
.auth-dialog input {
  width: 100%; padding: 10px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  color: var(--text); font-size: 14px; margin-bottom: 12px; font-family: inherit;
}
.auth-dialog input:focus { outline: none; border-color: var(--accent); }
.auth-dialog button {
  width: 100%; padding: 10px; background: var(--accent);
  border: none; border-radius: var(--radius-xs);
  color: #fff; cursor: pointer; font-size: 14px; font-weight: 600;
}
.auth-dialog button:hover { opacity: .85; }
.auth-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ─── Responsive ────────────────────────────────────────── */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar-toggle { display: none !important; }
  .right-panel { display: none; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">Pinocchio</span>
      <div class="llm-badge"><span class="llm-dot"></span><span id="llmLabel">LLM 就绪</span></div>

<script>
/* ═══ Auth fetch wrapper ═════════════════════════════════════ */
const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  const key = sessionStorage.getItem('pinocchio_api_key');
  if (key && typeof url === 'string' && url.startsWith('/api/')) {
    const newOpts = { ...opts, headers: { ...(opts.headers || {}), 'X-API-Key': key } };
    return _origFetch.call(this, url, newOpts);
  }
  return _origFetch.call(this, url, opts);
};

/* ═══ State ═══════════════════════════════════════════════ */
const F = { images: [], audios: [], videos: [] };
let busy = false;
let currentSessionId = null;

/* ═══ DOM ═════════════════════════════════════════════════ */
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const msgs    = $('#msgs');
const txtIn   = $('#txtIn');
const btnSend = $('#btnSend');
const filePills = $('#filePills');

/* ═══ Tabs ════════════════════════════════════════════════ */
$$('.tab').forEach(t => t.addEventListener('click', () => {
  $$('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  $$('.panel-view').forEach(p => p.classList.remove('active'));
  $(`#pv-${t.dataset.tab}`).classList.add('active');
  if (t.dataset.tab === 'memory') loadMemTab('episodes');
  if (t.dataset.tab === 'evolution') loadEvolution();
}));

$$('.mem-tab').forEach(t => t.addEventListener('click', () => {
  $$('.mem-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  loadMemTab(t.dataset.mem);
}));

/* ═══ Files ═══════════════════════════════════════════════ */
$('#fiImg').addEventListener('change', e => { pushFiles('images', e.target.files); e.target.value=''; });
$('#fiAud').addEventListener('change', e => { pushFiles('audios', e.target.files); e.target.value=''; });
$('#fiVid').addEventListener('change', e => { pushFiles('videos', e.target.files); e.target.value=''; });

function pushFiles(k, list) { for (const f of list) F[k].push(f); renderPills(); }
function rmFile(k, i) { F[k].splice(i, 1); renderPills(); }
function clearFiles() { F.images=[]; F.audios=[]; F.videos=[]; renderPills(); }

function renderPills() {
  const icons = { images:'🖼', audios:'🎵', videos:'🎬' };
  filePills.innerHTML = '';
  for (const [k, list] of Object.entries(F)) list.forEach((f,i) => {
    const d = document.createElement('span');
    d.className = 'file-pill';
    d.innerHTML = `${icons[k]} ${esc(f.name)} <span class="rm" onclick="rmFile('${k}',${i})">✕</span>`;
    filePills.appendChild(d);
  });
}

/* ═══ Messages ════════════════════════════════════════════ */
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function addMsg(role, text, atts, msgId) {
  const el = document.createElement('div');
  el.className = `msg msg-${role}`;
  if (msgId) el.dataset.msgId = msgId;
  if (atts && atts.length) {
    const ad = document.createElement('div');
    ad.className = 'msg-att';
    atts.forEach(a => {
      const p = document.createElement('span');
      p.className = 'att-pill';
      if (a.url) { const img=document.createElement('img'); img.src=a.url; p.appendChild(img); }
      p.appendChild(document.createTextNode(a.name));
      ad.appendChild(p);
    });
    el.appendChild(ad);
  }
  const c = document.createElement('div');
  c.className = 'msg-body';
  if (role === 'agent' && typeof marked !== 'undefined') {
    const raw = marked.parse(text || '');
    c.innerHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(raw) : raw;
    c.querySelectorAll('pre code').forEach(b => { if (typeof hljs !== 'undefined') hljs.highlightElement(b); });
  } else {
    c.textContent = text;
  }
  el.appendChild(c);
  if (role !== 'system') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    if (role === 'user') {
      actions.innerHTML = '<button class="msg-action-btn" title="编辑" onclick="editMsg(this)">\u270f\ufe0f</button><button class="msg-action-btn" title="复制" onclick="copyMsg(this)">\ud83d\udccb</button>';
    } else {
      actions.innerHTML = '<button class="msg-action-btn" title="重新生成" onclick="regenMsg()">\ud83d\udd04</button><button class="msg-action-btn" title="复制" onclick="copyMsg(this)">\ud83d\udccb</button>';
    }
    el.appendChild(actions);
  }
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg msg-agent typing';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function rmTyping() { const e=$('#typing'); if(e) e.remove(); }

/* ═══ Send ════════════════════════════════════════════════ */
async function send() {
  if (busy) return;
  const text = txtIn.value.trim();
  const hasF = F.images.length + F.audios.length + F.videos.length > 0;
  if (!text && !hasF) return;

  busy = true;
  btnSend.disabled = true;

  const atts = [];
  F.images.forEach(f => atts.push({name:f.name, url:URL.createObjectURL(f)}));
  F.audios.forEach(f => atts.push({name:f.name}));
  F.videos.forEach(f => atts.push({name:f.name}));

  addMsg('user', text || '(媒体文件)', atts.length ? atts : null);
  txtIn.value = '';
  autoH();
  addTyping();

  // Use SSE streaming for text-only messages; POST for file uploads
  if (text && !hasF) {
    clearFiles();
    try {
      const sseUrl = '/api/chat/stream?text=' + encodeURIComponent(text);
      // Build headers with API key if present
      const headers = {};
      const apiKey = sessionStorage.getItem('pinocchio_api_key');
      if (apiKey) headers['X-API-Key'] = apiKey;

      const response = await _origFetch(sseUrl, { headers });
      if (!response.ok) throw new Error('SSE 连接失败');

      rmTyping();
      // Create streaming message element
      const streamEl = document.createElement('div');
      streamEl.className = 'msg msg-agent';
      const streamBody = document.createElement('div');
      streamBody.className = 'msg-body';
      streamEl.appendChild(streamBody);
      msgs.appendChild(streamEl);

      let fullText = '';
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') continue;
          try {
            const d = JSON.parse(payload);
            if (d.text) {
              fullText += d.text;
              streamBody.textContent = fullText;
              msgs.scrollTop = msgs.scrollHeight;
            }
          } catch(_) {}
        }
      }

      // Final render with markdown
      if (typeof marked !== 'undefined' && fullText) {
        const raw = marked.parse(fullText);
        streamBody.innerHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(raw) : raw;
        streamBody.querySelectorAll('pre code').forEach(b => { if (typeof hljs !== 'undefined') hljs.highlightElement(b); });
      }
      // Add action buttons
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = '<button class="msg-action-btn" title="重新生成" onclick="regenMsg()">\ud83d\udd04</button><button class="msg-action-btn" title="复制" onclick="copyMsg(this)">\ud83d\udccb</button>';
      streamEl.appendChild(actions);

      // Set message IDs from a status refresh
      if (currentSessionId) {
        try {
          const statusR = await fetch('/api/status');
          const statusD = await statusR.json();
          currentSessionId = statusD.session_id;
        } catch(_) {}
      }
      refreshAll();
      loadSessions();
    } catch(e) {
      rmTyping();
      addMsg('system', '请求失败: '+e.message);
    } finally {
      busy = false;
      btnSend.disabled = false;
      txtIn.focus();
    }
    return;
  }

  // POST path for file uploads → uses progress SSE endpoint
  const fd = new FormData();
  fd.append('text', text);
  F.images.forEach(f => fd.append('images', f));
  F.audios.forEach(f => fd.append('audios', f));
  F.videos.forEach(f => fd.append('videos', f));
  clearFiles();

  try {
    const response = await _origFetch('/api/chat/progress', {method:'POST', body:fd});
    if (!response.ok) throw new Error('连接失败');

    rmTyping();
    // Show phase progress stepper
    const phaseEl = addPhaseProgress();

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalResult = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') continue;
        try {
          const d = JSON.parse(payload);
          if (d.type === 'phase') {
            updatePhaseStep(phaseEl, d.phase, d.status, d.detail);
          } else if (d.type === 'result') {
            finalResult = d;
          }
        } catch(_) {}
      }
    }

    // Remove phase progress, show response
    if (phaseEl) phaseEl.remove();
    if (finalResult) {
      if (finalResult.status === 'ok') {
        const userEls = msgs.querySelectorAll('.msg-user');
        const lastU = userEls[userEls.length - 1];
        if (lastU && finalResult.user_message_id) lastU.dataset.msgId = finalResult.user_message_id;
        addMsg('agent', finalResult.response, null, finalResult.assistant_message_id);
        if (finalResult.session_id) currentSessionId = finalResult.session_id;
      } else {
        addMsg('system', finalResult.response);
      }
    }
    refreshAll();
    loadSessions();
  } catch(e) {
    rmTyping();
    rmPhaseProgress();
    addMsg('system', '请求失败: '+e.message);
  } finally {
    busy = false;
    btnSend.disabled = false;
    txtIn.focus();
  }
}

/* ═══ Phase Progress ══════════════════════════════════════ */
const _phaseLabels = {
  preprocess: '预处理', perceive: '感知', plan: '规划',
  rag: '检索', strategize: '策略', execute: '执行',
  evaluate: '评估', learn: '学习', reflect: '元反思',
};
function addPhaseProgress() {
  const el = document.createElement('div');
  el.className = 'phase-progress';
  el.id = 'phaseProgress';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}
function updatePhaseStep(container, phase, status, detail) {
  if (!container) return;
  let step = container.querySelector(`[data-phase="${phase}"]`);
  if (!step) {
    // Add arrow if not first
    if (container.children.length > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'phase-arrow';
      arrow.textContent = '→';
      container.appendChild(arrow);
    }
    step = document.createElement('span');
    step.className = 'phase-step';
    step.dataset.phase = phase;
    step.innerHTML = `<span class="phase-dot"></span>${_phaseLabels[phase] || phase}`;
    container.appendChild(step);
  }
  step.className = `phase-step ${status === 'done' ? 'done' : 'running'}`;
  if (detail) step.title = detail;
  msgs.scrollTop = msgs.scrollHeight;
}
function rmPhaseProgress() { const e=$('#phaseProgress'); if(e) e.remove(); }

btnSend.addEventListener('click', send);
txtIn.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
function autoH() { txtIn.style.height='auto'; txtIn.style.height=Math.min(txtIn.scrollHeight,140)+'px'; }
txtIn.addEventListener('input', autoH);

/* ═══ Reset ═══════════════════════════════════════════════ */
$('#btnReset').addEventListener('click', async () => {
  if (!confirm('确定重置会话？持久化记忆保留')) return;
  await fetch('/api/reset', {method:'POST'});
  msgs.innerHTML = '';
  addMsg('system', '会话已重置');
  refreshAll();
  fetch('/api/status').then(r=>r.json()).then(s => { currentSessionId = s.session_id; loadSessions(); });
});

/* ═══ Exit ════════════════════════════════════════════════ */
$('#btnExit').addEventListener('click', async () => {
  if (!confirm('确定退出 Pinocchio？服务器将关闭。')) return;
  try {
    await fetch('/api/exit', {method:'POST'});
    addMsg('system', '服务器已关闭，请关闭此页面。');
  } catch(e) { /* server already down */ }
  document.title = 'Pinocchio — 已停止';
});

/* ═══ Overview data ═══════════════════════════════════════ */
async function refreshOverview() {
  try {
    const [st, tr] = await Promise.all([
      fetch('/api/status').then(r=>r.json()),
      fetch('/api/memory/trend').then(r=>r.json()),
    ]);

    $('#oInteract').textContent = st.interaction_count || 0;

    const mem = st.memory_summary || {};
    $('#oEpCnt').textContent = mem.episodic_count ?? 0;
    $('#oSemCnt').textContent = mem.semantic_count ?? 0;
    $('#oProcCnt').textContent = mem.procedural_count ?? 0;

    const pe = (mem.persistent_episodes||0) + (mem.persistent_knowledge||0) + (mem.persistent_procedures||0);
    $('#oPersist').textContent = pe;

    const trend = tr.trend || {};
    const avg = typeof trend.average_score === 'number' ? trend.average_score : (trend.recent_avg ?? null);
    if (avg !== null) {
      const el = $('#oAvg');
      el.textContent = avg.toFixed(1) + '/10';
      el.className = 'v ' + (avg >= 7 ? 'g' : avg >= 5 ? 'y' : 'r');
    }

    const trendText = trend.trend || '—';
    const tEl = $('#oTrend');
    tEl.textContent = {improving:'📈 上升', declining:'📉 下降', stable:'➡️ 稳定'}[trendText] || trendText;
    tEl.className = 'v ' + ({improving:'g', declining:'r', stable:'y'}[trendText] || '');

    // Hardware
    const r = st.resources || {};
    $('#oHcpu').textContent = r.cpu_count_physical ? r.cpu_count_physical+' 核' : '—';
    $('#oHram').textContent = r.ram_total_mb ? (r.ram_total_mb/1024).toFixed(0)+' GB' : '—';
    const gpus = r.gpus || [];
    $('#oHgpu').textContent = gpus.length ? gpus[0].name : '无';
    $('#oHgpu').className = 'v ' + (gpus.length ? 'g' : '');
    $('#oHwork').textContent = r.recommended_workers ?? '—';

    // Score chart
    drawChart(tr.timeline || []);
  } catch(e) { /* silent */ }
}

/* ═══ Mini chart ══════════════════════════════════════════ */
function drawChart(timeline) {
  const canvas = $('#chartScores');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, W, H);
  if (!timeline.length) {
    ctx.fillStyle = '#5c5e78';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', W/2, H/2);
    return;
  }

  const pad = { t:10, r:10, b:24, l:30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  // Grid lines
  ctx.strokeStyle = '#2a2a45';
  ctx.lineWidth = 1;
  for (let s = 0; s <= 10; s += 2) {
    const y = pad.t + ch - (s / 10) * ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#5c5e78';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(s, pad.l - 4, y + 3);
  }

  const n = timeline.length;
  const gap = n > 1 ? cw / (n - 1) : cw / 2;

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#7c6ff7';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  timeline.forEach((p, i) => {
    const x = pad.l + (n > 1 ? i * gap : cw / 2);
    const y = pad.t + ch - (p.score / 10) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, 'rgba(124,111,247,0.25)');
  grad.addColorStop(1, 'rgba(124,111,247,0)');
  ctx.lineTo(pad.l + (n > 1 ? (n-1)*gap : cw/2), pad.t + ch);
  ctx.lineTo(pad.l + (n > 1 ? 0 : cw/2), pad.t + ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Dots
  timeline.forEach((p, i) => {
    const x = pad.l + (n > 1 ? i * gap : cw / 2);
    const y = pad.t + ch - (p.score / 10) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = p.score >= 7 ? '#4ade80' : p.score >= 5 ? '#fbbf24' : '#f87171';
    ctx.fill();
  });

  // X labels (sparse)
  ctx.fillStyle = '#5c5e78';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(n / 6));
  timeline.forEach((p, i) => {
    if (i % step === 0 || i === n-1) {
      const x = pad.l + (n > 1 ? i * gap : cw / 2);
      ctx.fillText('#' + (i+1), x, H - 4);
    }
  });
}

/* ═══ Memory browser ══════════════════════════════════════ */
async function loadMemTab(tab) {
  const el = $('#memList');
  el.innerHTML = '<div class="empty">加载中…</div>';
  try {
    const data = await fetch(`/api/memory/${tab}`).then(r => r.json());
    if (!data.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }

    el.innerHTML = '';
    if (tab === 'episodes') renderEpisodes(el, data);
    else if (tab === 'knowledge') renderKnowledge(el, data);
    else if (tab === 'procedures') renderProcedures(el, data);
    else if (tab === 'working') renderWorking(el, data);
  } catch(e) { el.innerHTML = '<div class="empty">加载失败</div>'; }
}

function tierTag(tier) {
  const cls = 'mi-tag tag-' + (tier||'long_term');
  const label = {persistent:'持久',long_term:'长期',working:'工作'}[tier] || tier;
  return `<span class="${cls}">${label}</span>`;
}

function scoreColor(s) { return s >= 7 ? 'g' : s >= 5 ? 'y' : 'r'; }

function renderEpisodes(el, data) {
  // sort newest first
  data.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
  data.forEach(e => {
    const d = document.createElement('div');
    d.className = 'mem-item';
    const ts = e.timestamp ? new Date(e.timestamp).toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    d.innerHTML = `
      <div class="mi-head">
        <span class="mi-title">${esc(e.strategy_used || e.task_type)}</span>
        ${tierTag(e.memory_tier)}
      </div>
      <div class="mi-body">
        「${esc(truncate(e.user_intent, 60))}」
        <span class="mi-score" style="color:var(--${scoreColor(e.outcome_score)==='g'?'green':scoreColor(e.outcome_score)==='y'?'yellow':'red'})">${e.outcome_score}/10</span>
      </div>
      ${e.lessons && e.lessons.length ? '<ul class="mi-lessons">'+e.lessons.map(l=>'<li>'+esc(truncate(l,80))+'</li>').join('')+'</ul>' : ''}
      ${e.error_patterns && e.error_patterns.length ? '<div class="mi-meta" style="color:var(--red)">⚠ '+esc(e.error_patterns.join('; '))+'</div>' : ''}
      <div class="mi-meta">${ts} · ${esc(e.task_type)} · ${(e.modalities||[]).join(', ')}</div>
    `;
    el.appendChild(d);
  });
}

function renderKnowledge(el, data) {
  data.forEach(e => {
    const d = document.createElement('div');
    d.className = 'mem-item';
    const conf = Math.round((e.confidence||0)*100);
    d.innerHTML = `
      <div class="mi-head">
        <span class="mi-title">${esc(e.domain||'通用')}</span>
        ${tierTag(e.memory_tier)}
      </div>
      <div class="mi-body">${esc(e.knowledge)}</div>
      <div class="mi-meta">置信度 ${conf}% · 来源 ${(e.source_episodes||[]).length} 条交互</div>
    `;
    el.appendChild(d);
  });
}

function renderProcedures(el, data) {
  data.sort((a,b) => (b.success_rate||0) - (a.success_rate||0));
  data.forEach(e => {
    const d = document.createElement('div');
    d.className = 'mem-item';
    const rate = Math.round((e.success_rate||0)*100);
    d.innerHTML = `
      <div class="mi-head">
        <span class="mi-title">${esc(e.name)}</span>
        ${tierTag(e.memory_tier)}
      </div>
      <div class="mi-body">${esc(e.description||'')}</div>
      <ol class="mi-steps">${(e.steps||[]).map(s=>'<li>'+esc(s)+'</li>').join('')}</ol>
      <div class="mi-meta">成功率 ${rate}% · 使用 ${e.usage_count||0} 次 · ${esc(e.task_type)}</div>
    `;
    el.appendChild(d);
  });
}

function renderWorking(el, data) {
  if (!data.length) { el.innerHTML = '<div class="empty">工作记忆为空（会话级）</div>'; return; }
  data.forEach(e => {
    const d = document.createElement('div');
    d.className = 'mem-item';
    d.innerHTML = `
      <div class="mi-head">
        <span class="mi-title">${esc(e.category||'item')}</span>
        <span class="mi-tag tag-working">${esc(e.source||'')}</span>
      </div>
      <div class="mi-body">${esc(truncate(e.content, 200))}</div>
      <div class="mi-meta">相关度 ${Math.round((e.relevance||0)*100)}%</div>
    `;
    el.appendChild(d);
  });
}

function truncate(s, n) { return (!s || s.length <= n) ? (s||'') : s.slice(0, n) + '…'; }

/* ═══ Evolution view ══════════════════════════════════════ */
async function loadEvolution() {
  try {
    const [trendData, episodes, procedures] = await Promise.all([
      fetch('/api/memory/trend').then(r=>r.json()),
      fetch('/api/memory/episodes').then(r=>r.json()),
      fetch('/api/memory/procedures').then(r=>r.json()),
    ]);

    // Timeline — show score progression with strategy evolution
    const tlEl = $('#evoTimeline');
    const timeline = trendData.timeline || [];
    if (!timeline.length) {
      tlEl.innerHTML = '<div class="empty">尚未产生交互记录</div>';
    } else {
      tlEl.innerHTML = '';
      // Show newest first
      [...timeline].reverse().forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'mem-item';
        const ts = t.ts ? new Date(t.ts).toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        d.innerHTML = `
          <div class="mi-head">
            <span class="mi-title">#${timeline.length - i} ${esc(t.strategy||'')}</span>
            <span class="mi-score" style="color:var(--${scoreColor(t.score)==='g'?'green':scoreColor(t.score)==='y'?'yellow':'red'})">${t.score}/10</span>
          </div>
          <div class="mi-meta">${ts} · ${esc(t.task)} ${tierTag(t.tier)}</div>
        `;
        tlEl.appendChild(d);
      });
    }

    // Top procedures
    const procEl = $('#evoTopProc');
    const sorted = [...procedures].sort((a,b) => (b.success_rate||0)-(a.success_rate||0)).slice(0,5);
    if (!sorted.length) {
      procEl.innerHTML = '<div class="empty">尚无策略记录</div>';
    } else {
      procEl.innerHTML = '';
      sorted.forEach(p => {
        const d = document.createElement('div');
        d.className = 'mem-item';
        const rate = Math.round((p.success_rate||0)*100);
        d.innerHTML = `
          <div class="mi-head">
            <span class="mi-title">${esc(p.name)}</span>
            <span style="color:var(--green);font-size:12px;font-weight:600">${rate}%</span>
          </div>
          <div class="mi-meta">使用 ${p.usage_count||0} 次 · ${esc(p.task_type)}</div>
        `;
        procEl.appendChild(d);
      });
    }

    // Error patterns aggregated
    const errEl = $('#evoErrors');
    const errMap = {};
    episodes.forEach(e => (e.error_patterns||[]).forEach(p => { errMap[p] = (errMap[p]||0) + 1; }));
    const errors = Object.entries(errMap).sort((a,b)=>b[1]-a[1]);
    if (!errors.length) {
      errEl.innerHTML = '<div class="empty" style="color:var(--green)">✓ 暂无错误模式</div>';
    } else {
      errEl.innerHTML = '';
      errors.forEach(([msg, cnt]) => {
        const d = document.createElement('div');
        d.className = 'mem-item';
        d.innerHTML = `<div class="mi-body" style="color:var(--red)">${esc(msg)}</div><div class="mi-meta">出现 ${cnt} 次</div>`;
        errEl.appendChild(d);
      });
    }
  } catch(e) { /* silent */ }
}

/* ═══ Refresh all panels ══════════════════════════════════ */
function refreshAll() {
  refreshOverview();
  // Refresh active memory tab if visible
  const activeMemTab = document.querySelector('.mem-tab.active');
  if (activeMemTab && $('#pv-memory').classList.contains('active')) {
    loadMemTab(activeMemTab.dataset.mem);
  }
  if ($('#pv-evolution').classList.contains('active')) loadEvolution();
}

/* ═══ Session management ════════════════════════════════════ */
let _allSessions = [];

function groupByDate(sessions) {
  const now = new Date();
  const todayStr = now.toDateString();
  const yest = new Date(now); yest.setDate(yest.getDate() - 1);
  const yestStr = yest.toDateString();
  const d7 = new Date(now); d7.setDate(d7.getDate() - 7);
  const d30 = new Date(now); d30.setDate(d30.getDate() - 30);
  const buckets = { '今天':[], '昨天':[], '近 7 天':[], '近 30 天':[], '更早':[] };
  for (const s of sessions) {
    const d = new Date(s.updated_at || s.created_at);
    if (d.toDateString() === todayStr) buckets['今天'].push(s);
    else if (d.toDateString() === yestStr) buckets['昨天'].push(s);
    else if (d >= d7) buckets['近 7 天'].push(s);
    else if (d >= d30) buckets['近 30 天'].push(s);
    else buckets['更早'].push(s);
  }
  const groups = [];
  for (const [label, items] of Object.entries(buckets)) {
    if (items.length) groups.push({ label, items });
  }
  return groups;
}

function renderSessions(sessions) {
  const list = $('#sessionList');
  list.innerHTML = '';
  const groups = groupByDate(sessions);
  groups.forEach(g => {
    const lbl = document.createElement('div');
    lbl.className = 'session-group-label';
    lbl.textContent = g.label;
    list.appendChild(lbl);
    g.items.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      el.onclick = (e) => { if (!e.target.closest('.session-dots') && !e.target.closest('.session-dropdown')) switchSession(s.id); };
      el.innerHTML = `
        <span class="session-title">${esc(s.title)}</span>
        <button class="session-dots" onclick="event.stopPropagation();toggleSessionMenu(this,'${s.id}')">⋯</button>
        <div class="session-dropdown">
          <button onclick="event.stopPropagation();renameSession('${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>重命名</button>
          <button class="danger" onclick="event.stopPropagation();deleteSession('${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>删除</button>
        </div>
      `;
      list.appendChild(el);
    });
  });
}

async function loadSessions() {
  try {
    _allSessions = await fetch('/api/sessions').then(r=>r.json());
    renderSessions(_allSessions);
  } catch(e) { /* silent */ }
}

function filterSessions(q) {
  if (!q) { renderSessions(_allSessions); return; }
  const lq = q.toLowerCase();
  renderSessions(_allSessions.filter(s => s.title.toLowerCase().includes(lq)));
}

function toggleSessionMenu(btn, sid) {
  document.querySelectorAll('.session-dropdown.show').forEach(d => {
    if (d !== btn.nextElementSibling) { d.classList.remove('show'); d.previousElementSibling.classList.remove('open'); }
  });
  const dd = btn.nextElementSibling;
  const isOpen = dd.classList.toggle('show');
  btn.classList.toggle('open', isOpen);
  if (isOpen) {
    const close = (e) => { if (!dd.contains(e.target) && e.target !== btn) { dd.classList.remove('show'); btn.classList.remove('open'); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

function toggleSidebar() {
  document.querySelector('.app').classList.toggle('sidebar-collapsed');
}

async function newSession() {
  try {
    const r = await fetch('/api/sessions', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({})});
    const s = await r.json();
    currentSessionId = s.id;
    msgs.innerHTML = '';
    addMsg('system', '新对话已创建');
    loadSessions();
    refreshAll();
  } catch(e) { }
}

async function switchSession(id) {
  if (id === currentSessionId) return;
  try {
    const r = await fetch(`/api/sessions/${id}/switch`, {method:'POST'});
    const d = await r.json();
    currentSessionId = id;
    msgs.innerHTML = '';
    (d.messages || []).forEach(m => addMsg(m.role === 'user' ? 'user' : 'agent', m.content, null, m.id));
    if (!d.messages || !d.messages.length) addMsg('system', '对话已切换');
    loadSessions();
    refreshAll();
  } catch(e) { }
}

async function deleteSession(id) {
  if (!confirm('确定删除此对话？')) return;
  try {
    const r = await fetch(`/api/sessions/${id}`, {method:'DELETE'});
    if (r.ok) loadSessions();
    else { const d = await r.json(); alert(d.error || '删除失败'); }
  } catch(e) { }
}

async function renameSession(id) {
  const t = prompt('输入新标题:');
  if (!t) return;
  try {
    await fetch(`/api/sessions/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:t})});
    loadSessions();
  } catch(e) { }
}

/* ═══ Edit & Regenerate ═════════════════════════════════════ */
async function editMsg(btn) {
  const msgEl = btn.closest('.msg');
  const msgId = msgEl.dataset.msgId;
  if (!msgId) return;
  const body = msgEl.querySelector('.msg-body');
  const oldText = body.textContent;
  const newText = prompt('编辑消息:', oldText);
  if (!newText || newText === oldText) return;
  busy = true; btnSend.disabled = true;
  let next = msgEl.nextElementSibling;
  while (next) { const rm = next; next = next.nextElementSibling; rm.remove(); }
  body.textContent = newText;
  addTyping();
  try {
    const r = await fetch('/api/chat/edit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message_id:parseInt(msgId), text:newText})});
    const d = await r.json();
    rmTyping();
    d.status === 'ok' ? addMsg('agent', d.response, null, d.assistant_message_id) : addMsg('system', d.error || '编辑失败');
    refreshAll();
  } catch(e) { rmTyping(); addMsg('system', '编辑失败: '+e.message); }
  finally { busy = false; btnSend.disabled = false; }
}

async function regenMsg() {
  if (busy) return;
  busy = true; btnSend.disabled = true;
  const agentEls = msgs.querySelectorAll('.msg-agent');
  const last = agentEls[agentEls.length - 1];
  if (last) last.remove();
  addTyping();
  try {
    const r = await fetch('/api/chat/regenerate', {method:'POST'});
    const d = await r.json();
    rmTyping();
    d.status === 'ok' ? addMsg('agent', d.response, null, d.assistant_message_id) : addMsg('system', d.error || '重新生成失败');
    refreshAll();
  } catch(e) { rmTyping(); addMsg('system', '重新生成失败: '+e.message); }
  finally { busy = false; btnSend.disabled = false; }
}

function copyMsg(btn) {
  const body = btn.closest('.msg').querySelector('.msg-body');
  navigator.clipboard.writeText(body.textContent).then(() => {
    const orig = btn.textContent; btn.textContent='\u2713'; setTimeout(()=>btn.textContent=orig, 1200);
  });
}

/* ═══ Auth ════════════════════════════════════════════════ */
function showAuthDialog() {
  const ov=document.createElement('div'); ov.className='auth-overlay'; ov.id='authOverlay';
  ov.innerHTML='<div class="auth-dialog"><h3>\ud83d\udd10 需要 API 密钥</h3><input type="password" id="authKeyInput" placeholder="输入 API Key" autocomplete="off"><button onclick="submitAuth()">登录</button><div class="auth-err" id="authErr"></div></div>';
  document.body.appendChild(ov);
  const inp=$('#authKeyInput'); inp.focus();
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
}

async function submitAuth() {
  const key=$('#authKeyInput').value.trim();
  if(!key) return;
  sessionStorage.setItem('pinocchio_api_key', key);
  try {
    const r=await fetch('/api/status');
    if(r.ok) { $('#authOverlay').remove(); initApp(); }
    else { sessionStorage.removeItem('pinocchio_api_key'); $('#authErr').textContent='密钥无效'; }
  } catch(e) { $('#authErr').textContent='连接失败'; }
}

/* ═══ Init ════════════════════════════════════════════════ */
function initApp() {
  txtIn.focus();
  // Single status fetch on init — drives overview + session + LLM badge
  Promise.all([
    fetch('/api/status').then(r=>r.json()),
    fetch('/api/memory/trend').then(r=>r.json()),
  ]).then(([st, tr]) => {
    currentSessionId = st.session_id || null;
    const r = st.resources || {};
    $('#llmLabel').textContent = r.ollama_running ? '伺服中' : '就绪';

    // Overview
    $('#oInteract').textContent = st.interaction_count || 0;
    const mem = st.memory_summary || {};
    $('#oEpCnt').textContent = mem.episodic_count ?? 0;
    $('#oSemCnt').textContent = mem.semantic_count ?? 0;
    $('#oProcCnt').textContent = mem.procedural_count ?? 0;
    const pe = (mem.persistent_episodes||0)+(mem.persistent_knowledge||0)+(mem.persistent_procedures||0);
    $('#oPersist').textContent = pe;
    const trend = tr.trend || {};
    const avg = typeof trend.average_score === 'number' ? trend.average_score : (trend.recent_avg ?? null);
    if (avg !== null) {
      const el = $('#oAvg');
      el.textContent = avg.toFixed(1) + '/10';
      el.className = 'v ' + (avg >= 7 ? 'g' : avg >= 5 ? 'y' : 'r');
    }
    const trendText = trend.trend || '—';
    const tEl = $('#oTrend');
    tEl.textContent = {improving:'📈 上升', declining:'📉 下降', stable:'➡️ 稳定'}[trendText] || trendText;
    tEl.className = 'v ' + ({improving:'g', declining:'r', stable:'y'}[trendText] || '');
    $('#oHcpu').textContent = r.cpu_count_physical ? r.cpu_count_physical+' 核' : '—';
    $('#oHram').textContent = r.ram_total_mb ? (r.ram_total_mb/1024).toFixed(0)+' GB' : '—';
    const gpus = r.gpus || [];
    $('#oHgpu').textContent = gpus.length ? gpus[0].name : '无';
    $('#oHgpu').className = 'v ' + (gpus.length ? 'g' : '');
    $('#oHwork').textContent = r.recommended_workers ?? '—';
    drawChart(tr.timeline || []);

    loadSessions();
  }).catch(() => {
    $('#llmLabel').textContent = '未连接';
    document.querySelector('.llm-dot').style.background = '#f87171';
  });
}

// Configure marked.js
if (typeof marked !== 'undefined') { marked.use({ breaks: true }); }

// Check auth then init
(async ()=>{
  try {
    const r=await fetch('/api/status');
    if(r.status===401) { showAuthDialog(); return; }
    initApp();
  } catch(e) { initApp(); }
})();
</script>
